name: Open Repository Checklist
description: Complete this checklist before making a repository public within the DSCoE organisation.
labels: ["open-repo-checklist"]
projects: ["Defra-Data-Science-Centre-of-Excellence/137"]
assignees: ["SamRichDefra", "liza-wood-defra", "JackDale0", "tomkdefra"]

body:
  - type: markdown
    attributes:
      value: |
        By default, all repositories within the DSCoE organisation are private or internal. Before a repository can be made public it must pass this checklist and receive approval from an organisation admin.

        You do not need every item ticked to open the issue — items can be ticked off as the repository moves through review. The issue must not be closed until every item is ticked.

  - type: input
    id: repo-manager-github-username
    attributes:
      label: Repository manager username
      description: GitHub username of the person responsible for this repository.
    validations:
      required: true

  - type: input
    id: repo-manager-email
    attributes:
      label: Repository manager email
      description: Email address of the person responsible for this repository.
    validations:
      required: true    

  - type: checkboxes
    id: org-standards
    attributes:
      label: Organisation standards
      options:
        - label: All project members with access to the repository are using an account associated with a Defra email (not a personal GitHub account).
        - label: The repository is within the Defra Data Science Centre of Excellence (DSCoE) organisation.
        - label: An ethics lead has been consulted and a UKSA ethics self-assessment completed where required.

  - type: checkboxes
    id: data
    attributes:
      label: Data
      options:
        - label: No raw data is hosted on the repository (excluding small non-sensitive files such as images or logos).
        - label: All scripts and files have been checked for secret keys or access tokens.
        - label: All scripts and files have been checked for filepaths or links to internal or sensitive systems or data.
        - label: A `.gitignore` is in place with sufficient checks to prevent sensitive files being pushed, and is kept up to date.

  - type: checkboxes
    id: repo-standards
    attributes:
      label: Repository standards
      options:
        - label: The repository has an assigned manager/owner whose name and email are visible in the README.
        - label: A README is present covering the minimum requirements — description of work, inputs, requirements, and script descriptions.
        - label: A LICENSE file is present with the appropriate licence and the DEFRA copyright statement.

  - type: checkboxes
    id: best-practice
    attributes:
      label: Best practice
      options:
        - label: The code has been reviewed against the Dash Best Practice Guide.
        - label: Code comments are descriptive and of a professional standard.
        - label: Package and library versions are recorded at the top of each script or in a separate requirements file.
        - label: Input filepaths and parameters are in a config file rather than hard-coded in scripts.
        - label: If input data is publicly available, links to it are provided.
        - label: If input data is not publicly available, dummy or example data is included to show the expected format.
        - label: The code is modular — functions are used where possible to minimise repetition.

  - type: dropdown
    id: peer-review-level
    attributes:
      label: Peer review level
      options:
        - Not yet reviewed
        - Comments only
        - Comments with tracked changes
        - Full peer review with log
    validations:
      required: true

  - type: textarea
    id: peer-review-notes
    attributes:
      label: Peer review notes
      description: Reviewer name, key changes made, and where the review log is stored.
    validations:
      required: false

  - type: textarea
    id: qa-log
    attributes:
      label: QA log / additional comments
    validations:
      required: false

  - type: checkboxes
    id: admin-approval
    attributes:
      label: Organisation admin sign-off
      description: To be ticked by an organisation admin only, once all checks above have been verified.
      options:
        - label: I am an organisation admin and I approve this repository being made public.
